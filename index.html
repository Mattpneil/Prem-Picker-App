<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prem Picker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1>⚽ PREM PICKER</h1>
    <p class="subtitle">
        20 clubs enter. One club becomes yours.
    </p>

    <div id="counter">
        Teams Remaining: 20
    </div>

    <div id="teams" class="team-grid"></div>

    <button id="eliminateBtn">
        🎲 ELIMINATE A TEAM
    </button>

    <div id="message"></div>

    <div class="eliminated-box">
        <h2>Elimination Order</h2>
        <ol id="eliminated"></ol>
    </div>

    <button id="resetBtn" class="hidden">
        🔄 PICK AGAIN
    </button>

</div>


<script src="app.js"></script>

</body>
</html>
